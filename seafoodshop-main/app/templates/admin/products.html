{% extends "base.html" %}
{% block title %}Quản lý sản phẩm{% endblock %}

{% block content %}
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Danh sách sản phẩm</h2>
    <a href="{{ url_for('admin.add_product') }}" class="btn btn-primary">+ Thêm sản phẩm</a>
  </div>

  <table class="table table-hover table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Hình ảnh</th>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Tồn kho</th>
        <th>Hành động</th>
      </tr>
    </thead>

    <tbody>
      {% for p in products %}
      <tr>
        <td>
          <img src="{{ p.image }}" width="70" height="70" style="object-fit:cover; border-radius:6px;">
        </td>
        <td>{{ p.name }}</td>
        <td>{{ p.price | int }}₫</td>
        <td>{{ p.stock }}</td>
        <td>
          <a href="{{ url_for('admin.edit_product', product_id=p._id) }}" class="btn btn-sm btn-warning">Sửa</a>
          <a href="{{ url_for('admin.delete_product', product_id=p._id) }}"
             class="btn btn-sm btn-danger"
             onclick="return confirm('Xóa sản phẩm này?')">Xóa</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>

  </table>
</div>
{% endblock %}
