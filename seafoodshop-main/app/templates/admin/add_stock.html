{% extends "base.html" %}
{% block title %}Nhập kho{% endblock %}

{% block content %}
<div class="container py-4">

  <h2 class="mb-4">Tạo phiếu nhập kho</h2>

  <form method="POST">

    <div class="mb-3">
      <label class="form-label">Chọn sản phẩm</label>
      <select name="product_id" class="form-select" required>
        {% for p in products %}
        <option value="{{ p._id }}">{{ p.name }} (Tồn: {{ p.stock }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Số lượng nhập</label>
      <input type="number" name="quantity" class="form-control" required min="1">
    </div>

    <div class="mb-3">
      <label class="form-label">Ghi chú</label>
      <textarea name="note" class="form-control" rows="3"></textarea>
    </div>

    <button class="btn btn-primary">Lưu phiếu</button>
    <a href="{{ url_for('admin.stock') }}" class="btn btn-secondary">Hủy</a>

  </form>

</div>
{% endblock %}
