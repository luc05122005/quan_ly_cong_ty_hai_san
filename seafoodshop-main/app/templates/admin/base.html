<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
        }
        /* Sidebar */
        #sidebar {
            min-width: 220px;
            max-width: 220px;
            background: #343a40;
            color: #fff;
            flex-shrink: 0;
        }
        #sidebar a {
            color: #fff;
            text-decoration: none;
        }
        #sidebar .nav-link.active {
            background-color: #495057;
        }
        /* Main content */
        #content {
            flex-grow: 1;
            padding: 20px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="d-flex flex-column p-3">
        <a href="{{ url_for('admin.invoices') }}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4"><i class="bi bi-speedometer2"></i> Admin</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="{{ url_for('admin.invoices') }}" class="nav-link {% if request.endpoint == 'admin.invoices' %}active{% endif %}">
                    <i class="bi bi-receipt"></i> Hóa đơn
                </a>
            </li>
            <li>
                <a href="{{ url_for('admin.products') }}" class="nav-link {% if request.endpoint == 'admin.products' %}active{% endif %}">
                    <i class="bi bi-box-seam"></i> Sản phẩm
                </a>
            </li>
            <li>
                <a href="{{ url_for('admin.stock') }}" class="nav-link {% if request.endpoint == 'admin.stock' %}active{% endif %}">
                    <i class="bi bi-stack"></i> Kho hàng
                </a>
            </li>
            <li>
                <a href="{{ url_for('auth.logout') }}" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right"></i> Đăng xuất
                </a>
            </li>
        </ul>
        <hr>
        <div class="text-center small">
            &copy; 2025 Sea Food
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <header class="mb-4">
            <h2>{% block header %}{% endblock %}</h2>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer class="mt-4">
            &copy; 2025 Sea Food - Admin Panel
        </footer>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
